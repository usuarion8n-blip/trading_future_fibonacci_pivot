services:
  # =========================
  # 1) Cron diario pivots
  # =========================
  listening_service:
    build:
      context: ./listening_service
    env_file:
      - ./listening_service/.env
    environment:
      TZ: "UTC"
      CRON_SCHEDULE: "5 0 * * *"
      CRON_COMMAND: "node src/index.js"
    restart: unless-stopped
    networks:
      - trading_net
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  # =========================
  # 2) Bot realtime (trading)
  # =========================
  detect_opportunity:
    build:
      context: ./detect_opportunity
    env_file:
      - ./detect_opportunity/.env
    restart: unless-stopped
    depends_on:
      - listening_service
    networks:
      - trading_net
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  # =========================
  # 3) Front (Vite + Nginx)
  # =========================
  front_market:
    build:
      context: ./front_market
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - detect_opportunity
    networks:
      - trading_net
    logging:
      options:
        max-size: "10m"
        max-file: "5"

networks:
  trading_net:
    driver: bridge
